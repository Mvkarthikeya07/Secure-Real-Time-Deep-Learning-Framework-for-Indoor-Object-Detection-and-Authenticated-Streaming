<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — YOLO Detection</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f0f1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 40px 36px;
      width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo h1 {
      color: #00d4ff;
      font-size: 24px;
      letter-spacing: 1px;
    }

    .logo p {
      color: #888;
      font-size: 13px;
      margin-top: 4px;
    }

    label {
      display: block;
      color: #aaa;
      font-size: 13px;
      margin-bottom: 6px;
      margin-top: 18px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 7px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #00d4ff;
    }

    .error {
      background: #3a1a1a;
      border: 1px solid #ff4444;
      color: #ff6666;
      padding: 10px 14px;
      border-radius: 7px;
      font-size: 13px;
      margin-top: 16px;
      text-align: center;
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 26px;
      padding: 12px;
      background: #00d4ff;
      color: #0f0f1a;
      font-size: 15px;
      font-weight: bold;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.5px;
    }

    button[type="submit"]:hover {
      background: #00b8dd;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">
      <h1>🎯 YOLO Detect</h1>
      <p>Real-time object detection</p>
    </div>

    <!--
      ACTION must point to /auth — this is the Flask route that handles login.
      method="post" sends credentials securely in the request body.
    -->
    <form action="/auth" method="post">

      <label for="username">Username</label>
      <input
        type="text"
        id="username"
        name="username"
        placeholder="Enter username"
        autocomplete="username"
        required
      />

      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Enter password"
        autocomplete="current-password"
        required
      />

      <!-- Show error message if Flask passes one back -->
      {% if error %}
        <div class="error">⚠️ {{ error }}</div>
      {% endif %}

      <button type="submit">Sign In</button>

    </form>
  </div>

</body>
</html>
