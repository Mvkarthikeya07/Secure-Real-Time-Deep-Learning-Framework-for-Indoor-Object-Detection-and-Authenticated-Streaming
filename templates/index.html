<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YOLO Live Detection</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
    }

    /* ── Top bar ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
      padding: 14px 28px;
    }

    nav .brand {
      color: #00d4ff;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    nav .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
      color: #aaa;
      font-size: 14px;
    }

    nav .user-info span strong {
      color: #fff;
    }

    nav .logout-btn {
      background: transparent;
      border: 1px solid #ff4444;
      color: #ff6666;
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
      transition: background 0.2s;
    }

    nav .logout-btn:hover {
      background: #3a1a1a;
    }

    /* ── Main layout ── */
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px;
      gap: 20px;
    }

    h2 {
      color: #00d4ff;
      font-size: 18px;
      letter-spacing: 0.5px;
    }

    /* ── Video container ── */
    .video-wrap {
      position: relative;
      border: 2px solid #2a2a4a;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0, 212, 255, 0.1);
    }

    .video-wrap img {
      display: block;
      width: 640px;
      height: 480px;
      background: #111;
    }

    .status-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.65);
      border: 1px solid #00d4ff;
      color: #00d4ff;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #00ff88;
      border-radius: 50%;
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Info box ── */
    .info {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 14px 20px;
      width: 640px;
      font-size: 13px;
      color: #888;
      line-height: 1.7;
    }

    .info strong {
      color: #00d4ff;
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <div class="brand">🎯 YOLO Detect</div>
    <div class="user-info">
      <span>Logged in as <strong>{{ user }}</strong></span>
      <a href="/logout" class="logout-btn">Logout</a>
    </div>
  </nav>

  <!-- Main content -->
  <main>
    <h2>Live Camera Feed</h2>

    <div class="video-wrap">
      <!--
        /video_feed streams MJPEG directly from Flask.
        YOLO bounding boxes are drawn server-side on every frame.
      -->
      <img src="/video_feed" alt="Live YOLO Detection Feed" />

      <div class="status-badge">
        <span class="dot"></span> LIVE
      </div>
    </div>

    <div class="info">
      <strong>Model:</strong> YOLOv8m &nbsp;|&nbsp;
      <strong>Confidence:</strong> 0.45 &nbsp;|&nbsp;
      <strong>Resolution:</strong> 640×480<br/>
      Bounding boxes and labels are rendered in real-time on the server.
      If an object is not detected, it may not be in the COCO 80-class list.
    </div>
  </main>

</body>
</html>
